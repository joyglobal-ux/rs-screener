name: Daily data refresh

on:
  schedule:
    # 09:00 UTC, Tue–Sat. One run captures BOTH markets fresh:
    #   - KR (KOSPI/KOSDAQ): today's close, finished 06:30 UTC (~2.5h earlier)
    #   - US (NYSE/Nasdaq):  prev session close (Mon 20:00 UTC -> Tue 09:00 UTC)
    # Cron is always UTC (no DST). Runs a FULL refresh: both universes are
    # re-screened every time, so newly qualifying names are added automatically.
    - cron: "0 9 * * 2-6"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Refresh universe + returns
        run: uv run python refresh.py

      - name: Commit & push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data-us.js data-us.json universe-us.json \
                  data-kr.js data-kr.json universe-kr.json
          if git diff --staged --quiet; then
            echo "No data changes."
          else
            git commit -m "data: daily refresh $(date -u +%Y-%m-%d)"
            git push
          fi
