<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RS Screener · 미국·한국 주가상승률 스크리너</title>
<style>
  :root{
    --bg:#0e1117; --panel:#161b22; --panel2:#1c2230; --border:#2a3140;
    --text:#e6edf3; --muted:#8b949e; --accent:#3b82f6; --accent2:#1f6feb;
    --pos:#22c55e; --neg:#f87171; --rowhover:#1b2230;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    font-size:13px;}
  a{color:var(--accent);text-decoration:none}
  a:hover{text-decoration:underline}
  .wrap{max-width:1460px;margin:0 auto;padding:18px 16px 60px}
  header{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;margin-bottom:4px}
  h1{font-size:18px;margin:0;font-weight:650;letter-spacing:-.2px}
  .sub{color:var(--muted);font-size:12px}
  .author{color:var(--muted);font-size:12px;font-weight:600}
  .backlink{display:inline-block;font-size:12.5px;color:var(--muted);font-weight:600;margin-bottom:10px;text-decoration:none;transition:color .15s}
  .backlink:hover{color:var(--accent)}
  .market-toggle{margin-left:auto;display:inline-flex;border:1px solid var(--border);border-radius:8px;overflow:hidden}
  .market-toggle button{background:var(--panel);color:var(--muted);border:none;padding:6px 14px;font-size:12.5px;font-weight:700;cursor:pointer;letter-spacing:.3px}
  .market-toggle button:hover{color:var(--text)}
  .market-toggle button.active{background:var(--accent2);color:#fff}
  .meta{color:var(--muted);font-size:11.5px;margin:6px 0 14px}
  .meta b{color:var(--text);font-weight:600}

  .controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
  .controls input,.controls select{
    background:var(--panel);border:1px solid var(--border);color:var(--text);
    border-radius:7px;padding:7px 10px;font-size:12.5px;outline:none}
  .controls input:focus,.controls select:focus{border-color:var(--accent)}
  #search{min-width:210px}
  .spacer{flex:1}

  .tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
  .tab{background:var(--panel);border:1px solid var(--border);color:var(--muted);
    padding:7px 14px;border-radius:8px;cursor:pointer;font-size:12.5px;font-weight:600;
    user-select:none;transition:all .12s}
  .tab:hover{border-color:var(--accent);color:var(--text)}
  .tab.active{background:var(--accent2);border-color:var(--accent2);color:#fff}
  .tab .dir{font-size:10px;opacity:.85;margin-left:5px}

  .tablewrap{border:1px solid var(--border);border-radius:10px;overflow-x:auto;background:var(--panel)}
  table{border-collapse:collapse;width:100%}
  thead th{position:sticky;top:0;background:var(--panel2);z-index:2;
    text-align:right;padding:9px 10px;font-size:11.5px;color:var(--muted);
    font-weight:600;white-space:nowrap;cursor:pointer;border-bottom:1px solid var(--border);user-select:none}
  thead th.l{text-align:left}
  thead th:hover{color:var(--text)}
  thead th.sorted{color:var(--accent);background:#222a3a}
  th .arr{font-size:9px;margin-left:3px}
  tbody td{padding:7px 10px;text-align:right;white-space:nowrap;border-bottom:1px solid #1b212c}
  tbody td.l{text-align:left}
  tbody tr:hover{background:var(--rowhover)}
  tbody tr:last-child td{border-bottom:none}
  .rank{color:var(--muted);font-variant-numeric:tabular-nums;width:42px}
  .tkr{font-weight:700;letter-spacing:.2px}
  .name{color:var(--muted);max-width:230px;overflow:hidden;text-overflow:ellipsis}
  .sector{color:var(--muted);font-size:11.5px}
  .num{font-variant-numeric:tabular-nums}
  .pos{color:var(--pos)} .neg{color:var(--neg)} .na{color:#4b5563}
  td.score{font-variant-numeric:tabular-nums;font-size:13px}
  td.score b{color:#eafff1}
  td.qual{font-variant-numeric:tabular-nums;color:#cfe3ff}
  td.colsorted{background:rgba(59,130,246,.07)}
  th.star,td.star{width:34px;text-align:center;padding-left:8px;padding-right:4px}
  td.star{cursor:pointer;color:#3a4150;font-size:15px;user-select:none}
  td.star:hover{color:#f5c451}
  td.star.on{color:#f5c451}
  .tab.dim{opacity:.55}
  .tab.dir-toggle{margin-left:4px;border-style:dashed}
  .watch-label{display:inline-flex;align-items:center;gap:6px;background:var(--panel);
    border:1px solid var(--border);border-radius:7px;padding:6px 11px;font-size:12.5px;
    color:var(--text);cursor:pointer;user-select:none;font-weight:600}
  .watch-label input{margin:0;cursor:pointer}
  .watch-label .cnt{color:var(--muted);font-weight:600}
  /* watchlist groups */
  .group-bar{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
  .gchip{display:inline-flex;align-items:center;gap:5px;background:var(--panel);border:1px solid var(--border);
    color:var(--muted);border-radius:8px;padding:6px 11px;font-size:12.5px;font-weight:600;cursor:pointer;user-select:none}
  .gchip:hover{border-color:var(--accent);color:var(--text)}
  .gchip.active{background:#3a2f12;border-color:#f5c451;color:#f5d98a}
  .gchip .gcnt{color:var(--muted);font-weight:600;font-size:11px}
  .gchip.active .gcnt{color:#cdb36a}
  .gchip .gx{margin-left:1px;opacity:.55;font-size:13px;line-height:1}
  .gchip .gx:hover{opacity:1;color:var(--neg)}
  .gchip .gedit:hover{color:var(--accent)}
  .gchip.add{border-style:dashed;color:var(--muted)}
  .gfilter{display:inline-flex;align-items:center;gap:6px;margin-left:6px;font-size:12px;color:var(--muted);cursor:pointer;user-select:none}
  .gfilter input{margin:0;cursor:pointer}
  .sorthint{color:var(--muted);font-size:11.5px;margin:-4px 0 14px}
  .sorthint b{color:#9fc1ff;font-weight:600}
  .view-toggle{display:inline-flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:12px}
  .view-toggle button{background:var(--panel);color:var(--muted);border:none;padding:7px 16px;font-size:12.5px;font-weight:700;cursor:pointer}
  .view-toggle button:hover{color:var(--text)}
  .view-toggle button.active{background:var(--accent2);color:#fff}
  td.sec-name{cursor:pointer;font-weight:600}
  tbody tr.sec-row:hover td{background:var(--rowhover)}
  .heat{font-variant-numeric:tabular-nums}
  .bar-wrap{display:flex;align-items:center;gap:8px;justify-content:flex-end}
  .bar-track{flex:0 0 70px;height:8px;background:#222a36;border-radius:4px;overflow:hidden}
  .bar-fill{height:100%;background:#22c55e;border-radius:4px}
  td.heatdev{font-variant-numeric:tabular-nums;font-weight:600}
  .tkr.chartlink{cursor:pointer;color:var(--accent)}
  .tkr.chartlink:hover{text-decoration:underline}
  /* deviation chart modal */
  .modal-bg{position:fixed;inset:0;background:rgba(5,8,14,.78);z-index:50;display:none;
    align-items:center;justify-content:center;padding:24px}
  .modal-bg.open{display:flex}
  .modal{background:var(--panel);border:1px solid var(--border);border-radius:14px;
    width:min(1080px,96vw);max-height:92vh;overflow:auto;padding:18px 20px 22px}
  .modal-head{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px}
  .modal-head h2{font-size:16px;margin:0;font-weight:700}
  .modal-head .mname{color:var(--muted);font-size:12.5px}
  .modal-head .x{margin-left:auto;background:var(--panel2);border:1px solid var(--border);
    color:var(--text);border-radius:8px;width:30px;height:30px;cursor:pointer;font-size:15px}
  .modal-ctl{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)}
  .modal-ctl input[type=range]{accent-color:var(--accent);width:130px}
  .modal-ctl .win{color:var(--pos);font-weight:700;min-width:42px}
  .modal-ext{color:var(--accent);font-size:12px}
  .stat-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
  .stat{flex:1 1 120px;background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
  .stat .lbl{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.4px}
  .stat .val{font-size:18px;font-weight:700;margin-top:3px;font-variant-numeric:tabular-nums}
  .stat .sub{color:var(--muted);font-size:11px;margin-top:2px}
  #devChart{width:100%;height:420px;display:block}
  .chart-legend{display:flex;gap:16px;justify-content:center;color:var(--muted);font-size:12px;margin-top:8px}
  .chart-legend i{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:5px;vertical-align:middle}

  .pager{display:flex;gap:10px;align-items:center;justify-content:center;margin-top:14px;color:var(--muted);font-size:12px}
  .pager button{background:var(--panel);border:1px solid var(--border);color:var(--text);
    border-radius:7px;padding:6px 12px;cursor:pointer;font-size:12px}
  .pager button:disabled{opacity:.4;cursor:default}
  .empty{padding:40px;text-align:center;color:var(--muted)}
  .err{padding:30px;text-align:center;color:var(--neg);line-height:1.6}
</style>
</head>
<body>
<div class="wrap">
  <a class="backlink" href="/">← Polaris 허브</a>
  <header>
    <h1>Relative-Strength Screener</h1>
    <span class="sub" id="sub">기간별 주가상승률 + 종합 RS점수</span>
    <div class="market-toggle" id="marketToggle">
      <button data-m="us">US</button>
      <button data-m="kr">KR</button>
    </div>
    <span class="author">작성자: Jay</span>
  </header>
  <div class="meta" id="meta"></div>

  <div class="view-toggle" id="viewToggle">
    <button data-v="stocks">종목</button>
    <button data-v="sectors">섹터 RS</button>
  </div>

  <div class="controls" id="controls">
    <input id="search" type="text" placeholder="티커 / 종목명 검색…" autocomplete="off">
    <select id="sector"><option value="">전체 섹터</option></select>
    <select id="mcap"></select>
    <span class="spacer"></span>
    <select id="pagesize">
      <option value="50">50개씩</option>
      <option value="100" selected>100개씩</option>
      <option value="250">250개씩</option>
      <option value="100000">전체</option>
    </select>
  </div>

  <div class="group-bar" id="groupBar"></div>
  <div class="tabs" id="tabs"></div>
  <div class="sorthint" id="sorthint"></div>

  <div class="tablewrap" id="tablewrap">
    <table>
      <thead><tr id="thead"></tr></thead>
      <tbody id="tbody"></tbody>
    </table>
    <div id="empty" class="empty" style="display:none">조건에 맞는 종목이 없습니다.</div>
  </div>

  <div class="pager" id="pager"></div>

  <div class="sorthint" id="sectorhint" style="display:none"></div>
  <div class="tablewrap" id="sectorwrap" style="display:none">
    <table>
      <thead><tr id="sec-thead"></tr></thead>
      <tbody id="sec-tbody"></tbody>
    </table>
  </div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-head">
      <h2 id="mTicker"></h2>
      <span class="mname" id="mName"></span>
      <div class="modal-ctl">MA <input type="range" id="mWin" min="5" max="200" step="5" value="50"><span class="win" id="mWinL">50D</span></div>
      <a class="modal-ext" id="mExt" target="_blank" rel="noopener">외부차트 ↗</a>
      <button class="x" id="mClose">✕</button>
    </div>
    <div class="stat-row">
      <div class="stat"><div class="lbl">Latest Close</div><div class="val" id="sClose">—</div><div class="sub" id="sCloseD"></div></div>
      <div class="stat"><div class="lbl">Moving Average</div><div class="val" id="sMA">—</div><div class="sub" id="sMAL"></div></div>
      <div class="stat"><div class="lbl">이격도 (Deviation)</div><div class="val" id="sDev">—</div><div class="sub">Close vs MA</div></div>
      <div class="stat"><div class="lbl">과열도 (Heat)</div><div class="val" id="sHeat">—</div><div class="sub">자기 1년 분포 percentile</div></div>
    </div>
    <canvas id="devChart"></canvas>
    <div class="chart-legend">
      <span><i style="background:#5eb3f6"></i>종가</span>
      <span><i style="background:#f5c451"></i>이동평균</span>
      <span><i style="background:#22c55e"></i>이격% (우축)</span>
    </div>
  </div>
</div>

<script>
const PERIODS = ["1W","1M","3M","6M","1Y","YTD"];
const PLABEL = {"1W":"1주","1M":"1개월","3M":"3개월","6M":"6개월","1Y":"1년","YTD":"YTD"};
const COLS = [
  {key:"_star", label:"",      align:"l", sortable:false},
  {key:"rank",  label:"#",    align:"l", sortable:false},
  {key:"ticker",label:"티커", align:"l", sortable:true},
  {key:"name",  label:"종목명",align:"l", sortable:true},
  {key:"sector",label:"섹터", align:"l", sortable:true},
  {key:"price", label:"현재가",align:"r", sortable:true},
  {key:"marketCap",label:"시총",align:"r", sortable:true},
  ...PERIODS.map(p=>({key:"r."+p, label:PLABEL[p], align:"r", sortable:true, period:p})),
  {key:"score", label:"RS점수",align:"r", sortable:true},
  {key:"scoreShort", label:"단기RS",align:"r", sortable:true},
  {key:"quality",label:"품질", align:"r", sortable:true},
  {key:"accel",  label:"가속", align:"r", sortable:true},
  {key:"dev.heat",  label:"과열도", align:"r", sortable:true},
  {key:"dev.dev50", label:"이격50", align:"r", sortable:true},
  {key:"dev.dev200",label:"이격200",align:"r", sortable:true},
];
const SORT_TABS = [...PERIODS.map(p=>({key:"r."+p,label:PLABEL[p]})),
  {key:"score",label:"RS점수"},{key:"scoreShort",label:"단기RS"},
  {key:"quality",label:"품질"},{key:"accel",label:"가속"}];
const METRIC_KEYS = new Set(SORT_TABS.map(t=>t.key));
const TAB_LABEL = Object.fromEntries(SORT_TABS.map(t=>[t.key,t.label]));
const COL_LABEL = Object.fromEntries(COLS.map(c=>[c.key,c.label]));

let DATA=null, rows=[], view=[];
let market="us", page=0, pageSize=100;
// Sort state: "composite" = avg percentile of `picks` (multi-metric strength);
// "column" = single direct-value sort on a non-metric column (price, name…).
let sortMode="composite", picks=["score"], compDir="desc", colKey="score", colDir="desc";
// Named watchlist groups, per market. groups=[{id,name,t:[tickers]}]; activeGroup
// = a group id (the star-edit target) or "all" (read-only union view).
let groups=[], activeGroup="all", groupFilter=false;
let viewMode="stocks", secSortKey="medScore", secSortDir="desc";
const SECTOR_COLS=[
  {key:"sector",  label:"섹터",      align:"l"},
  {key:"n",       label:"종목수",    align:"r"},
  {key:"medScore",label:"RS 중앙값", align:"r"},
  {key:"breadth", label:"RS≥90 비중",align:"r"},
  {key:"p1M",     label:"1M",        align:"r"},
  {key:"p3M",     label:"3M",        align:"r"},
  {key:"p6M",     label:"6M",        align:"r"},
  {key:"p1Y",     label:"12M",       align:"r"},
];

const MARKETS = {
  us: {
    fmtCap: v => v>=1e12 ? "$"+(v/1e12).toFixed(2)+"T" : v>=1e9 ? "$"+(v/1e9).toFixed(1)+"B" : "$"+(v/1e6).toFixed(0)+"M",
    fmtPrice: v => "$"+v.toFixed(2),
    mcapOptions: [
      {v:1e9,  l:"시총 전체 (≥$1B)"},
      {v:1e10, l:"≥ $10B"},
      {v:5e10, l:"≥ $50B"},
      {v:2e11, l:"≥ $200B"},
    ],
    tickerUrl: r => `https://finance.yahoo.com/quote/${r.ticker}`,
  },
  kr: {
    // 시총: 1조 이상이면 "조"(소수 1자리), 아니면 "억"(천단위 구분).
    fmtCap: v => v>=1e12 ? (v/1e12).toFixed(1)+"조" : Math.round(v/1e8).toLocaleString()+"억",
    fmtPrice: v => "₩"+Math.round(v).toLocaleString(),
    mcapOptions: [
      {v:1e11, l:"시총 전체 (≥1,000억)"},
      {v:5e11, l:"≥ 5,000억"},
      {v:1e12, l:"≥ 1조"},
      {v:1e13, l:"≥ 10조"},
    ],
    tickerUrl: r => `https://finance.naver.com/item/main.naver?code=${r.krxCode}`,
  },
};
function fmtCap(v){ return MARKETS[market].fmtCap(v); }
function fmtPrice(v){ return MARKETS[market].fmtPrice(v); }
function fmtPct(v){ return v==null ? "—" : (v>=0?"+":"")+v.toFixed(1)+"%"; }
function pctClass(v){ return v==null?"na":(v>0?"pos":(v<0?"neg":"")); }
function scoreCell(v){
  if(v==null) return `<td class="num na">—</td>`;
  const a=(v/99*0.34).toFixed(3);            // green heat, stronger = brighter
  return `<td class="num score" style="background:rgba(34,197,94,${a})"><b>${v}</b></td>`;
}
function scoreShortCell(v){                    // 단기RS — teal so it reads as "the other" score
  if(v==null) return `<td class="num na">—</td>`;
  const a=(v/99*0.34).toFixed(3);
  return `<td class="num score" style="background:rgba(45,212,191,${a})"><b>${v}</b></td>`;
}
function qualCell(v){                          // trend smoothness R^2, 0..1
  if(v==null) return `<td class="num na">—</td>`;
  const a=(Math.max(0,v)*0.34).toFixed(3);   // blue heat
  return `<td class="num qual" style="background:rgba(96,165,250,${a})">${v.toFixed(2)}</td>`;
}
function accelCell(v){                         // recent3M - prior3M, in %p
  if(v==null) return `<td class="num na">—</td>`;
  const cls=v>0?"pos":(v<0?"neg":"");
  const arr=v>5?" ↑":(v<-5?" ↓":"");
  return `<td class="num ${cls}">${(v>=0?"+":"")+v.toFixed(0)}%p${arr}</td>`;
}
function heatCell(v){                           // 과열도 0-100, amber→red as it rises
  if(v==null) return `<td class="num na">—</td>`;
  const a=(v/100*0.55).toFixed(3);             // warmer = more stretched = caution
  return `<td class="num heatdev" style="background:rgba(239,108,68,${a})">${v}</td>`;
}
function devCell(v){                            // close vs MA, signed %
  if(v==null) return `<td class="num na">—</td>`;
  const cls=v>0?"pos":(v<0?"neg":"");
  return `<td class="num ${cls}">${(v>=0?"+":"")+v.toFixed(1)}%</td>`;
}
function getVal(row,key){
  if(key.startsWith("r.")) return row.r[key.slice(2)];
  if(key.startsWith("dev.")) return row.dev ? row.dev[key.slice(4)] : null;
  return row[key];
}

function cmp(a,b,key,dir){
  let x=getVal(a,key), y=getVal(b,key);
  const xn=(x==null), yn=(y==null);
  if(xn&&yn) return 0;
  if(xn) return 1;            // nulls always last
  if(yn) return -1;
  if(typeof x==="string"){ x=x.toLowerCase(); y=String(y).toLowerCase();
    return dir==="asc" ? (x<y?-1:x>y?1:0) : (x>y?-1:x<y?1:0); }
  return dir==="asc" ? x-y : y-x;
}

// Cross-sectional percentile (0..1) of every sortable metric across the whole
// market, cached on each row as r._pct[key]. Lets the composite sort average
// "rank within the market" across the picked metrics — robust to outliers.
function precomputePercentiles(){
  for(const key of METRIC_KEYS){
    const vals = rows.map(r=>({r, v:getVal(r,key)})).filter(o=>typeof o.v==="number");
    vals.sort((a,b)=>a.v-b.v);
    const n=vals.length;
    vals.forEach((o,i)=>{ (o.r._pct || (o.r._pct={}))[key] = n>1 ? i/(n-1) : 1; });
  }
}
function compositeVal(r){
  let sum=0, cnt=0;
  for(const k of picks){ const p=r._pct ? r._pct[k] : undefined; if(p!=null){ sum+=p; cnt++; } }
  return cnt ? sum/cnt : null;
}
function isActiveKey(key){
  return sortMode==="composite" ? picks.includes(key) : key===colKey;
}
function activeDir(){ return sortMode==="composite" ? compDir : colDir; }

function sortView(){
  if(sortMode==="composite"){
    view.sort((a,b)=>{
      const x=compositeVal(a), y=compositeVal(b);
      if(x==null && y==null) return 0;
      if(x==null) return 1; if(y==null) return -1;
      return compDir==="desc" ? y-x : x-y;
    });
  } else {
    view.sort((a,b)=>cmp(a,b,colKey,colDir));
  }
}

function applyFilters(){
  const q=document.getElementById("search").value.trim().toLowerCase();
  const sec=document.getElementById("sector").value;
  const minCap=parseFloat(document.getElementById("mcap").value)||0;
  const activeMembers=activeTickerSet();
  view = rows.filter(r=>{
    if(groupFilter && !activeMembers.has(r.ticker)) return false;
    if(r.marketCap<minCap) return false;
    if(sec && r.sector!==sec) return false;
    if(q && !(r.ticker.toLowerCase().includes(q) || r.name.toLowerCase().includes(q))) return false;
    return true;
  });
  sortView();
  page=0;
  render();
}

function render(){
  renderTabs(); renderHead(); renderHint(); renderGroups();
  const tb=document.getElementById("tbody");
  const empty=document.getElementById("empty");
  if(view.length===0){
    tb.innerHTML="";
    empty.textContent = groupFilter && activeTickerSet().size===0
      ? "이 그룹에 종목이 없습니다. 표의 ☆를 눌러 추가하세요."
      : "조건에 맞는 종목이 없습니다.";
    empty.style.display="block"; renderPager(); return;
  }
  empty.style.display="none";
  const start=page*pageSize, slice=view.slice(start,start+pageSize);
  const gtitle = activeGroup==="all" ? "그룹에 포함됨(전체)" : ("'"+(activeG()?activeG().name:"")+"' 그룹 토글");
  let html="";
  slice.forEach((r,i)=>{
    const rank=start+i+1;
    const on = inActive(r.ticker);
    let cells=`<td class="star${on?" on":""}" data-tkr="${esc(r.ticker)}" title="${esc(gtitle)}">${on?"★":"☆"}</td>`;
    cells+=`<td class="rank num">${rank}</td>`;
    cells+=`<td class="l"><span class="tkr chartlink" data-tkr="${esc(r.ticker)}" title="이격도 차트 보기">${r.ticker.replace(/\.(KS|KQ)$/,'')}</span></td>`;
    cells+=`<td class="l name" title="${esc(r.name)}">${esc(r.name)}</td>`;
    cells+=`<td class="l sector">${esc(r.sector)}</td>`;
    cells+=`<td class="num">${fmtPrice(r.price)}</td>`;
    cells+=`<td class="num">${fmtCap(r.marketCap)}</td>`;
    for(const p of PERIODS){
      const v=r.r[p];
      const sortedCol = isActiveKey("r."+p) ? " colsorted":"";
      cells+=`<td class="num ${pctClass(v)}${sortedCol}">${fmtPct(v)}</td>`;
    }
    cells+=scoreCell(r.score);
    cells+=scoreShortCell(r.scoreShort);
    cells+=qualCell(r.quality);
    cells+=accelCell(r.accel);
    const dv=r.dev||{};
    cells+=heatCell(dv.heat);
    cells+=devCell(dv.dev50);
    cells+=devCell(dv.dev200);
    html+=`<tr>${cells}</tr>`;
  });
  tb.innerHTML=html;
  renderPager();
}

function renderPager(){
  const el=document.getElementById("pager");
  const total=view.length, pages=Math.max(1,Math.ceil(total/pageSize));
  const from=total?page*pageSize+1:0, to=Math.min((page+1)*pageSize,total);
  el.innerHTML=`<button id="prev" ${page<=0?"disabled":""}>← 이전</button>
    <span>${from.toLocaleString()}–${to.toLocaleString()} / 총 ${total.toLocaleString()}개 · ${page+1}/${pages} 페이지</span>
    <button id="next" ${page>=pages-1?"disabled":""}>다음 →</button>`;

function esc(s){ return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c])); }

function median(a){ if(!a.length) return null; const b=[...a].sort((x,y)=>x-y); const m=b.length>>1; return b.length%2 ? b[m] : (b[m-1]+b[m])/2; }
function heatGreen(v,max){ const a=(Math.max(0,Math.min(v,max))/max*0.34).toFixed(3); return `background:rgba(34,197,94,${a})`; }

// Aggregate the loaded universe into per-sector strength. RS Score is already a
// market-wide percentile, so a sector's median RS = where its typical stock
// sits in the whole market; breadth = share of names that are genuine leaders
// (RS≥90); the 1M..12M cells are median per-period percentiles → rotation.
function sectorAgg(){
  const by={};
  rows.forEach(r=>{ const s=r.sector||"기타"; (by[s]||(by[s]=[])).push(r); });
  const out=[];
  for(const sector in by){
    const list=by[sector];
    const scores=list.map(r=>r.score).filter(v=>v!=null);
    if(scores.length<3) continue;                 // skip micro sectors (noise)
    const agg={sector, n:list.length,
      medScore: median(scores),
      breadth: scores.filter(v=>v>=90).length/scores.length*100};
    for(const p of ["1M","3M","6M","1Y"]){
      const pcts=list.map(r=> r._pct ? r._pct["r."+p] : undefined).filter(v=>v!=null).map(v=>v*100);
      agg["p"+p]=median(pcts);
    }
    out.push(agg);
  }
  return out;
}

function renderSectors(){

    const x=a[secSortKey], y=b[secSortKey];
    if(typeof x==="string") return secSortDir==="asc" ? (x<y?-1:x>y?1:0) : (x>y?-1:x<y?1:0);
    if(x==null) return 1; if(y==null) return -1;

  th.querySelectorAll("th").forEach(h=>h.onclick=()=>{

    c+=`<td class="num">${a.n}</td>`;

    c+=`<td class="num"><div class="bar-wrap"><div class="bar-track"><div class="bar-fill" style="width:${a.breadth.toFixed(0)}%"></div></div>${a.breadth.toFixed(0)}%</div></td>`;
    for(const p of ["1M","3M","6M","1Y"]){
      const v=a["p"+p];
      c+= v==null ? `<td class="num na">—</td>` : `<td class="num heat" style="${heatGreen(v,100)}">${v.toFixed(0)}</td>`;
    }
    return `<tr class="sec-row">${c}</tr>`;

    setViewMode("stocks"); applyFilters();
  });
  document.getElementById("sectorhint").innerHTML =
    `<b>RS 중앙값</b> = 섹터 종목들의 시장 백분위 중앙값 · <b>RS≥90 비중</b> = 강세 폭(breadth) · `+
    `<b>1M~12M</b> = 기간별 시장 백분위 중앙값(로테이션) · 섹터 클릭 → 해당 종목 목록 · 종목 3개 미만 섹터 제외`;
}

function newGid(){ return "g"+Math.random().toString(36).slice(2,8); }
function loadGroups(m){
  let gs=null;
  try{ gs=JSON.parse(localStorage.getItem("rs-groups-"+m)); }catch(e){}
  if(!Array.isArray(gs)){
    // migrate a legacy single watchlist into one default group
    let legacy=[]; try{ legacy=JSON.parse(localStorage.getItem("rs-watch-"+m)||"[]"); }catch(e){}
    gs = legacy.length ? [{id:newGid(), name:"관심종목", t:legacy}] : [];
  }
  groups = gs;
  let act="all"; try{ act=localStorage.getItem("rs-active-"+m)||""; }catch(e){}
  // default to the first group (so starring works immediately); "all" only if asked
  activeGroup = (act==="all" || groups.some(g=>g.id===act)) ? (act||"all")
              : (groups[0] ? groups[0].id : "all");
}
function saveGroups(){
  try{
    localStorage.setItem("rs-groups-"+market, JSON.stringify(groups));
    localStorage.setItem("rs-active-"+market, activeGroup);
  }catch(e){}
}
function activeG(){ return groups.find(g=>g.id===activeGroup); }
function inActive(tkr){
  if(activeGroup==="all") return groups.some(g=>g.t.includes(tkr));
  const g=activeG(); return !!g && g.t.includes(tkr);
}
function activeTickerSet(){
  if(activeGroup==="all"){ const s=new Set(); groups.forEach(g=>g.t.forEach(t=>s.add(t))); return s; }
  const g=activeG(); return new Set(g?g.t:[]);
}
function toggleStar(tkr){
  // star edits the active group; if none is selected, make/seed one
  if(activeGroup==="all"){
    if(groups.length===0){ groups.push({id:newGid(), name:"관심종목", t:[]}); }
    activeGroup = groups[0] ? groups[0].id : "all";   // fall into a concrete group
  }
  const g=activeG(); if(!g) return;
  const i=g.t.indexOf(tkr);
  if(i>=0) g.t.splice(i,1); else g.t.push(tkr);
  saveGroups();
}
function addGroup(){
  const name=(prompt("새 관심그룹 이름 (예: 광통신, 메모리, 소부장)")||"").trim();
  if(!name) return;
  const g={id:newGid(), name, t:[]};
  groups.push(g); activeGroup=g.id; saveGroups(); refreshView();
}
function renameGroup(id){
  const g=groups.find(x=>x.id===id); if(!g) return;
  const name=(prompt("그룹 이름 변경", g.name)||"").trim();
  if(name){ g.name=name; saveGroups(); renderGroups(); }
}
function deleteGroup(id){
  const g=groups.find(x=>x.id===id); if(!g) return;
  if(!confirm(`'${g.name}' 그룹을 삭제할까요? (종목 ${g.t.length}개)`)) return;
  groups=groups.filter(x=>x.id!==id);
  if(activeGroup===id) activeGroup = groups[0] ? groups[0].id : "all";
  saveGroups(); refreshView();
}
function renderGroups(){
  const el=document.getElementById("groupBar");
  const union=new Set(); groups.forEach(g=>g.t.forEach(t=>union.add(t)));
  let html=`<div class="gchip ${activeGroup==="all"?"active":""}" data-g="all">전체 <span class="gcnt">${union.size}</span></div>`;
  for(const g of groups){
    const on=g.id===activeGroup;
    html+=`<div class="gchip ${on?"active":""}" data-g="${g.id}" title="클릭: 선택 · 더블클릭: 이름변경">`+
          `${esc(g.name)} <span class="gcnt">${g.t.length}</span>`+
          (on?`<span class="gx gedit" data-edit="${g.id}" title="이름 변경">✎</span>`+
              `<span class="gx" data-del="${g.id}" title="그룹 삭제">✕</span>`:"")+`</div>`;
  }
  html+=`<div class="gchip add" id="gAdd">+ 새 그룹</div>`;
  html+=`<label class="gfilter"><input type="checkbox" id="gFilter" ${groupFilter?"checked":""}> 이 그룹만 보기</label>`;
  el.innerHTML=html;
  el.querySelectorAll(".gchip[data-g]").forEach(c=>{
    c.onclick=e=>{ if(e.target.dataset.del||e.target.dataset.edit) return; activeGroup=c.dataset.g; saveGroups(); refreshView(); };
    c.ondblclick=()=>{ if(c.dataset.g!=="all") renameGroup(c.dataset.g); };
  });
  el.querySelectorAll(".gedit").forEach(x=>x.onclick=e=>{ e.stopPropagation(); renameGroup(x.dataset.edit); });
  el.querySelectorAll(".gx:not(.gedit)").forEach(x=>x.onclick=e=>{ e.stopPropagation(); deleteGroup(x.dataset.del); });
  document.getElementById("gAdd").onclick=addGroup;
  document.getElementById("gFilter").onchange=e=>{ groupFilter=e.target.checked; applyFilters(); };
}

// ---------- Deviation chart (lazy-loaded per-market close series) ----------
let chartTkr=null, chartWin=50, chartData=null;
function loadSeries(m){
  return new Promise((resolve,reject)=>{
    const have=window["SCREENER_SERIES_"+m.toUpperCase()];
    if(have){ resolve(have); return; }
    const s=document.createElement("script");
    s.src="series-"+m+".js?v="+new Date().toISOString().slice(0,10);  // daily cache-bust
    s.onload=()=>resolve(window["SCREENER_SERIES_"+m.toUpperCase()]);
    s.onerror=()=>reject(new Error("series load failed"));
    document.head.appendChild(s);
  });
}
function sma(arr,w){
  const out=new Array(arr.length).fill(null);
  for(let i=w-1;i<arr.length;i++){
    let sum=0, ok=true;
    for(let j=i-w+1;j<=i;j++){ const v=arr[j]; if(v==null){ok=false;break;} sum+=v; }
    if(ok) out[i]=sum/w;
  }
  return out;
}
async function openChart(tkr){
  const row=rows.find(r=>r.ticker===tkr); if(!row) return;
  chartTkr=tkr; chartData=null;
  document.getElementById("mTicker").textContent=tkr.replace(/\.(KS|KQ)$/,'');
  document.getElementById("mName").textContent=row.name;
  document.getElementById("mExt").href=MARKETS[market].tickerUrl(row);
  document.getElementById("sHeat").textContent=row.dev&&row.dev.heat!=null?row.dev.heat:"—";
  document.getElementById("modalBg").classList.add("open");
  let ser;
  try{ ser=await loadSeries(market); }
  catch(e){ document.getElementById("sClose").textContent="로드 실패"; return; }
  const entry=ser.series[tkr];
  if(!entry){ document.getElementById("sClose").textContent="시계열 없음"; return; }
  chartData={dates: ser.dates.slice(entry.o), closes: entry.c, heat: row.dev&&row.dev.heat};
  drawChart();
}
function closeChart(){ document.getElementById("modalBg").classList.remove("open"); chartTkr=null; }
function fmtAxis(v){ if(Math.abs(v)>=1e6) return (v/1e6).toFixed(1)+"M"; if(Math.abs(v)>=1e3) return (v/1e3).toFixed(0)+"k"; return v.toFixed(0); }

function drawChart(){
  if(!chartData) return;
  const {dates,closes}=chartData, win=chartWin, n=closes.length;
  const ma=sma(closes,win);
  const dev=closes.map((c,i)=> (c!=null&&ma[i]!=null&&ma[i]>0)?(c/ma[i]-1)*100:null);
  const lastC=closes[n-1], lastMA=ma[n-1], lastDev=dev[n-1];
  // stat cards
  document.getElementById("sClose").textContent=lastC!=null?fmtPrice(lastC):"—";
  document.getElementById("sCloseD").textContent=dates[n-1]||"";
  document.getElementById("sMA").textContent=lastMA!=null?fmtPrice(lastMA):"—";
  document.getElementById("sMAL").textContent="MA "+win+"D";
  const sd=document.getElementById("sDev");
  sd.textContent=lastDev!=null?((lastDev>=0?"+":"")+lastDev.toFixed(2)+"%"):"—";
  sd.style.color=lastDev>=0?"var(--pos)":"var(--neg)";
  // canvas
  const cv=document.getElementById("devChart"), dpr=window.devicePixelRatio||1;
  const W=cv.clientWidth||1000, H=cv.clientHeight||420;
  cv.width=W*dpr; cv.height=H*dpr;
  const ctx=cv.getContext("2d"); ctx.setTransform(dpr,0,0,dpr,0,0); ctx.clearRect(0,0,W,H);
  const x0=64,x1=W-52,y0=14,y1=H-42;
  let pmin=Infinity,pmax=-Infinity;
  for(const v of closes) if(v!=null){pmin=Math.min(pmin,v);pmax=Math.max(pmax,v);}
  for(const v of ma) if(v!=null){pmin=Math.min(pmin,v);pmax=Math.max(pmax,v);}
  if(!isFinite(pmin)) return;
  let dmax=5; for(const v of dev) if(v!=null) dmax=Math.max(dmax,Math.abs(v)); dmax*=1.1;
  const pPad=(pmax-pmin)*0.06||1, pLo=pmin-pPad, pHi=pmax+pPad;
  const xAt=i=> x0+(n<=1?0:(i/(n-1))*(x1-x0));
  const yP=v=> y1-((v-pLo)/(pHi-pLo))*(y1-y0);
  const mid=(y0+y1)/2, yD=v=> mid-(v/dmax)*((y1-y0)/2);
  ctx.font="11px -apple-system,sans-serif"; ctx.textBaseline="middle";
  for(let k=0;k<=4;k++){ const v=pLo+(pHi-pLo)*k/4, y=yP(v);
    ctx.strokeStyle="rgba(255,255,255,.06)"; ctx.beginPath();ctx.moveTo(x0,y);ctx.lineTo(x1,y);ctx.stroke();
    ctx.fillStyle="#8b949e"; ctx.textAlign="right"; ctx.fillText(fmtAxis(v),x0-6,y); }
  ctx.textAlign="left";
  for(let k=-2;k<=2;k++){ const v=dmax*k/2, y=yD(v); ctx.fillStyle="#6f7b8a"; ctx.fillText((v>=0?"+":"")+v.toFixed(0)+"%",x1+6,y); }
  ctx.strokeStyle="rgba(255,255,255,.14)"; ctx.beginPath();ctx.moveTo(x0,yD(0));ctx.lineTo(x1,yD(0));ctx.stroke();
  const bw=Math.max(1,(x1-x0)/n*0.7);
  for(let i=0;i<n;i++){ const v=dev[i]; if(v==null) continue; const x=xAt(i),y=yD(v),yz=yD(0);
    ctx.fillStyle=v>=0?"rgba(34,197,94,.5)":"rgba(248,113,113,.55)"; ctx.fillRect(x-bw/2,Math.min(y,yz),bw,Math.abs(y-yz)||1); }
  let started=false; ctx.strokeStyle="#5eb3f6"; ctx.lineWidth=1.6; ctx.beginPath();
  for(let i=0;i<n;i++){ const v=closes[i]; if(v==null){started=false;continue;} const x=xAt(i),y=yP(v); started?ctx.lineTo(x,y):ctx.moveTo(x,y); started=true; } ctx.stroke();
  started=false; ctx.strokeStyle="#f5c451"; ctx.lineWidth=1.4; ctx.setLineDash([5,4]); ctx.beginPath();
  for(let i=0;i<n;i++){ const v=ma[i]; if(v==null){started=false;continue;} const x=xAt(i),y=yP(v); started?ctx.lineTo(x,y):ctx.moveTo(x,y); started=true; } ctx.stroke(); ctx.setLineDash([]);
  ctx.fillStyle="#8b949e"; ctx.textAlign="center"; ctx.textBaseline="top";
  for(let k=0;k<7;k++){ const i=Math.round(k/6*(n-1)); ctx.fillText((dates[i]||"").slice(2),xAt(i),y1+8); }
}

function init(){
  if(!window.SCREENER_DATA_US && !window.SCREENER_DATA_KR){
    document.querySelector(".tablewrap").innerHTML=
      `<div class="err">데이터 파일을 찾을 수 없습니다.<br>먼저 <b>uv run python refresh.py</b> 로 생성하세요.</div>`;
    return;
  }
  document.getElementById("search").addEventListener("input", applyFilters);
  document.getElementById("sector").addEventListener("change", applyFilters);
  document.getElementById("mcap").addEventListener("change", applyFilters);
  document.getElementById("pagesize").addEventListener("change", e=>{ pageSize=parseInt(e.target.value); page=0; render(); });
  document.querySelectorAll("#marketToggle button").forEach(b=>{ b.onclick=()=>setMarket(b.dataset.m); });
  document.querySelectorAll("#viewToggle button").forEach(b=>{ b.onclick=()=>setViewMode(b.dataset.v); });
  // row clicks via event delegation (rows are re-rendered as innerHTML)
  document.getElementById("tbody").addEventListener("click", e=>{
    const chart = e.target.closest(".chartlink");
    if(chart){ openChart(chart.dataset.tkr); return; }
    const cell = e.target.closest(".star"); if(!cell) return;
    toggleStar(cell.dataset.tkr);
    // re-render so the group counts + (if filtered) the visible set stay in sync
    applyFilters();
  });
  // deviation chart modal controls
  document.getElementById("mClose").onclick=closeChart;
  document.getElementById("modalBg").addEventListener("click", e=>{ if(e.target.id==="modalBg") closeChart(); });
  document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeChart(); });
  document.getElementById("mWin").addEventListener("input", e=>{
    chartWin=parseInt(e.target.value); document.getElementById("mWinL").textContent=chartWin+"D"; drawChart();
  });
  window.addEventListener("resize", ()=>{ if(document.getElementById("modalBg").classList.contains("open")) drawChart(); });
  let saved="us"; try{ saved=localStorage.getItem("rs-market")||"us"; }catch(e){}
  if(!setMarket(saved)) setMarket(saved==="us"?"kr":"us");
  setViewMode("stocks");   // sets toggle active state + correct visibility
}

// Load the data files with a per-minute cache-bust so a reload always shows the
// latest daily numbers — GitHub Pages caches assets ~10min, which otherwise made
// returning visitors see stale data after a refresh. init() runs once both load.
(function bootstrap(){
  const v = "?v=" + Math.floor(Date.now()/60000);
  let pending = 2;
  const done = () => { if(--pending === 0) init(); };
  ["data-us.js","data-kr.js"].forEach(f=>{
    const s=document.createElement("script");
    s.src=f+v; s.onload=done; s.onerror=done;   // init handles a missing market
    document.head.appendChild(s);
  });
})();
</script>
