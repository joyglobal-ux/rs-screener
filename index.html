<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RS Screener · 미국·한국 주가상승률 스크리너</title>
<style>
  :root{
    --bg:#0e1117; --panel:#161b22; --panel2:#1c2230; --border:#2a3140;
    --text:#e6edf3; --muted:#8b949e; --accent:#3b82f6; --accent2:#1f6feb;
    --pos:#22c55e; --neg:#f87171; --rowhover:#1b2230;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    font-size:13px;}
  a{color:var(--accent);text-decoration:none}
  a:hover{text-decoration:underline}
  .wrap{max-width:1460px;margin:0 auto;padding:18px 16px 60px}
  header{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;margin-bottom:4px}
  h1{font-size:18px;margin:0;font-weight:650;letter-spacing:-.2px}
  .sub{color:var(--muted);font-size:12px}
  .author{color:var(--muted);font-size:12px;font-weight:600}
  .market-toggle{margin-left:auto;display:inline-flex;border:1px solid var(--border);border-radius:8px;overflow:hidden}
  .market-toggle button{background:var(--panel);color:var(--muted);border:none;padding:6px 14px;font-size:12.5px;font-weight:700;cursor:pointer;letter-spacing:.3px}
  .market-toggle button:hover{color:var(--text)}
  .market-toggle button.active{background:var(--accent2);color:#fff}
  .meta{color:var(--muted);font-size:11.5px;margin:6px 0 14px}
  .meta b{color:var(--text);font-weight:600}

  .controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
  .controls input,.controls select{
    background:var(--panel);border:1px solid var(--border);color:var(--text);
    border-radius:7px;padding:7px 10px;font-size:12.5px;outline:none}
  .controls input:focus,.controls select:focus{border-color:var(--accent)}
  #search{min-width:210px}
  .spacer{flex:1}

  .tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
  .tab{background:var(--panel);border:1px solid var(--border);color:var(--muted);
    padding:7px 14px;border-radius:8px;cursor:pointer;font-size:12.5px;font-weight:600;
    user-select:none;transition:all .12s}
  .tab:hover{border-color:var(--accent);color:var(--text)}
  .tab.active{background:var(--accent2);border-color:var(--accent2);color:#fff}
  .tab .dir{font-size:10px;opacity:.85;margin-left:5px}

  .tablewrap{border:1px solid var(--border);border-radius:10px;overflow-x:auto;background:var(--panel)}
  table{border-collapse:collapse;width:100%}
  thead th{position:sticky;top:0;background:var(--panel2);z-index:2;
    text-align:right;padding:9px 10px;font-size:11.5px;color:var(--muted);
    font-weight:600;white-space:nowrap;cursor:pointer;border-bottom:1px solid var(--border);user-select:none}
  thead th.l{text-align:left}
  thead th:hover{color:var(--text)}
  thead th.sorted{color:var(--accent);background:#222a3a}
  th .arr{font-size:9px;margin-left:3px}
  tbody td{padding:7px 10px;text-align:right;white-space:nowrap;border-bottom:1px solid #1b212c}
  tbody td.l{text-align:left}
  tbody tr:hover{background:var(--rowhover)}
  tbody tr:last-child td{border-bottom:none}
  .rank{color:var(--muted);font-variant-numeric:tabular-nums;width:42px}
  .tkr{font-weight:700;letter-spacing:.2px}
  .name{color:var(--muted);max-width:230px;overflow:hidden;text-overflow:ellipsis}
  .sector{color:var(--muted);font-size:11.5px}
  .num{font-variant-numeric:tabular-nums}
  .pos{color:var(--pos)} .neg{color:var(--neg)} .na{color:#4b5563}
  td.score{font-variant-numeric:tabular-nums;font-size:13px}
  td.score b{color:#eafff1}
  td.qual{font-variant-numeric:tabular-nums;color:#cfe3ff}
  td.colsorted{background:rgba(59,130,246,.07)}
  th.star,td.star{width:34px;text-align:center;padding-left:8px;padding-right:4px}
  td.star{cursor:pointer;color:#3a4150;font-size:15px;user-select:none}
  td.star:hover{color:#f5c451}
  td.star.on{color:#f5c451}
  .tab.dim{opacity:.55}
  .tab.dir-toggle{margin-left:4px;border-style:dashed}
  .watch-label{display:inline-flex;align-items:center;gap:6px;background:var(--panel);
    border:1px solid var(--border);border-radius:7px;padding:6px 11px;font-size:12.5px;
    color:var(--text);cursor:pointer;user-select:none;font-weight:600}
  .watch-label input{margin:0;cursor:pointer}
  .watch-label .cnt{color:var(--muted);font-weight:600}
  .sorthint{color:var(--muted);font-size:11.5px;margin:-4px 0 14px}
  .sorthint b{color:#9fc1ff;font-weight:600}

  .pager{display:flex;gap:10px;align-items:center;justify-content:center;margin-top:14px;color:var(--muted);font-size:12px}
  .pager button{background:var(--panel);border:1px solid var(--border);color:var(--text);
    border-radius:7px;padding:6px 12px;cursor:pointer;font-size:12px}
  .pager button:disabled{opacity:.4;cursor:default}
  .empty{padding:40px;text-align:center;color:var(--muted)}
  .err{padding:30px;text-align:center;color:var(--neg);line-height:1.6}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Relative-Strength Screener</h1>
    <span class="sub" id="sub">기간별 주가상승률 + 종합 RS점수</span>
    <div class="market-toggle" id="marketToggle">
      <button data-m="us">US</button>
      <button data-m="kr">KR</button>
    </div>
    <span class="author">작성자: Jay</span>
  </header>
  <div class="meta" id="meta"></div>

  <div class="controls">
    <input id="search" type="text" placeholder="티커 / 종목명 검색…" autocomplete="off">
    <select id="sector"><option value="">전체 섹터</option></select>
    <select id="mcap"></select>
    <label class="watch-label"><input type="checkbox" id="watchonly"> ⭐ 관심종목만 <span class="cnt" id="watchcnt"></span></label>
    <span class="spacer"></span>
    <select id="pagesize">
      <option value="50">50개씩</option>
      <option value="100" selected>100개씩</option>
      <option value="250">250개씩</option>
      <option value="100000">전체</option>
    </select>
  </div>

  <div class="tabs" id="tabs"></div>
  <div class="sorthint" id="sorthint"></div>

  <div class="tablewrap">
    <table>
      <thead><tr id="thead"></tr></thead>
      <tbody id="tbody"></tbody>
    </table>
    <div id="empty" class="empty" style="display:none">조건에 맞는 종목이 없습니다.</div>
  </div>

  <div class="pager" id="pager"></div>
</div>

<script src="data-us.js"></script>
<script src="data-kr.js"></script>
<script>
const PERIODS = ["1W","1M","3M","6M","1Y","YTD"];
const PLABEL = {"1W":"1주","1M":"1개월","3M":"3개월","6M":"6개월","1Y":"1년","YTD":"YTD"};
const COLS = [
  {key:"_star", label:"",      align:"l", sortable:false},
  {key:"rank",  label:"#",    align:"l", sortable:false},
  {key:"ticker",label:"티커", align:"l", sortable:true},
  {key:"name",  label:"종목명",align:"l", sortable:true},
  {key:"sector",label:"섹터", align:"l", sortable:true},
  {key:"price", label:"현재가",align:"r", sortable:true},
  {key:"marketCap",label:"시총",align:"r", sortable:true},
  ...PERIODS.map(p=>({key:"r."+p, label:PLABEL[p], align:"r", sortable:true, period:p})),
  {key:"score", label:"RS점수",align:"r", sortable:true},
  {key:"quality",label:"품질", align:"r", sortable:true},
  {key:"accel",  label:"가속", align:"r", sortable:true},
];
const SORT_TABS = [...PERIODS.map(p=>({key:"r."+p,label:PLABEL[p]})),
  {key:"score",label:"RS점수"},{key:"quality",label:"품질"},{key:"accel",label:"가속"}];
const METRIC_KEYS = new Set(SORT_TABS.map(t=>t.key));
const TAB_LABEL = Object.fromEntries(SORT_TABS.map(t=>[t.key,t.label]));
const COL_LABEL = Object.fromEntries(COLS.map(c=>[c.key,c.label]));

let DATA=null, rows=[], view=[];
let market="us", page=0, pageSize=100;
// Sort state: "composite" = avg percentile of `picks` (multi-metric strength);
// "column" = single direct-value sort on a non-metric column (price, name…).
let sortMode="composite", picks=["score"], compDir="desc", colKey="score", colDir="desc";
let watch=new Set(), watchOnly=false;

const MARKETS = {
  us: {
    fmtCap: v => v>=1e12 ? "$"+(v/1e12).toFixed(2)+"T" : v>=1e9 ? "$"+(v/1e9).toFixed(1)+"B" : "$"+(v/1e6).toFixed(0)+"M",
    fmtPrice: v => "$"+v.toFixed(2),
    mcapOptions: [
      {v:1e9,  l:"시총 전체 (≥$1B)"},
      {v:1e10, l:"≥ $10B"},
      {v:5e10, l:"≥ $50B"},
      {v:2e11, l:"≥ $200B"},
    ],
    tickerUrl: r => `https://finance.yahoo.com/quote/${r.ticker}`,
  },
  kr: {
    // 시총: 1조 이상이면 "조"(소수 1자리), 아니면 "억"(천단위 구분).
    fmtCap: v => v>=1e12 ? (v/1e12).toFixed(1)+"조" : Math.round(v/1e8).toLocaleString()+"억",
    fmtPrice: v => "₩"+Math.round(v).toLocaleString(),
    mcapOptions: [
      {v:1e11, l:"시총 전체 (≥1,000억)"},
      {v:5e11, l:"≥ 5,000억"},
      {v:1e12, l:"≥ 1조"},
      {v:1e13, l:"≥ 10조"},
    ],
    tickerUrl: r => `https://finance.naver.com/item/main.naver?code=${r.krxCode}`,
  },
};
function fmtCap(v){ return MARKETS[market].fmtCap(v); }
function fmtPrice(v){ return MARKETS[market].fmtPrice(v); }
function fmtPct(v){ return v==null ? "—" : (v>=0?"+":"")+v.toFixed(1)+"%"; }
function pctClass(v){ return v==null?"na":(v>0?"pos":(v<0?"neg":"")); }
function scoreCell(v){
  if(v==null) return `<td class="num na">—</td>`;
  const a=(v/99*0.34).toFixed(3);            // green heat, stronger = brighter
  return `<td class="num score" style="background:rgba(34,197,94,${a})"><b>${v}</b></td>`;
}
function qualCell(v){                          // trend smoothness R^2, 0..1
  if(v==null) return `<td class="num na">—</td>`;
  const a=(Math.max(0,v)*0.34).toFixed(3);   // blue heat
  return `<td class="num qual" style="background:rgba(96,165,250,${a})">${v.toFixed(2)}</td>`;
}
function accelCell(v){                         // recent3M - prior3M, in %p
  if(v==null) return `<td class="num na">—</td>`;
  const cls=v>0?"pos":(v<0?"neg":"");
  const arr=v>5?" ↑":(v<-5?" ↓":"");
  return `<td class="num ${cls}">${(v>=0?"+":"")+v.toFixed(0)}%p${arr}</td>`;
}
function getVal(row,key){ return key.startsWith("r.") ? row.r[key.slice(2)] : row[key]; }

function cmp(a,b,key,dir){
  let x=getVal(a,key), y=getVal(b,key);
  const xn=(x==null), yn=(y==null);
  if(xn&&yn) return 0;
  if(xn) return 1;            // nulls always last
  if(yn) return -1;
  if(typeof x==="string"){ x=x.toLowerCase(); y=String(y).toLowerCase();
    return dir==="asc" ? (x<y?-1:x>y?1:0) : (x>y?-1:x<y?1:0); }
  return dir==="asc" ? x-y : y-x;
}

// Cross-sectional percentile (0..1) of every sortable metric across the whole
// market, cached on each row as r._pct[key]. Lets the composite sort average
// "rank within the market" across the picked metrics — robust to outliers.
function precomputePercentiles(){
  for(const key of METRIC_KEYS){
    const vals = rows.map(r=>({r, v:getVal(r,key)})).filter(o=>typeof o.v==="number");
    vals.sort((a,b)=>a.v-b.v);
    const n=vals.length;
    vals.forEach((o,i)=>{ (o.r._pct || (o.r._pct={}))[key] = n>1 ? i/(n-1) : 1; });
  }
}
function compositeVal(r){
  let sum=0, cnt=0;
  for(const k of picks){ const p=r._pct ? r._pct[k] : undefined; if(p!=null){ sum+=p; cnt++; } }
  return cnt ? sum/cnt : null;
}
function isActiveKey(key){
  return sortMode==="composite" ? picks.includes(key) : key===colKey;
}
function activeDir(){ return sortMode==="composite" ? compDir : colDir; }

function sortView(){
  if(sortMode==="composite"){
    view.sort((a,b)=>{
      const x=compositeVal(a), y=compositeVal(b);
      if(x==null && y==null) return 0;
      if(x==null) return 1; if(y==null) return -1;
      return compDir==="desc" ? y-x : x-y;
    });
  } else {
    view.sort((a,b)=>cmp(a,b,colKey,colDir));
  }
}

function applyFilters(){
  const q=document.getElementById("search").value.trim().toLowerCase();
  const sec=document.getElementById("sector").value;
  const minCap=parseFloat(document.getElementById("mcap").value)||0;
  view = rows.filter(r=>{
    if(watchOnly && !watch.has(r.ticker)) return false;
    if(r.marketCap<minCap) return false;
    if(sec && r.sector!==sec) return false;
    if(q && !(r.ticker.toLowerCase().includes(q) || r.name.toLowerCase().includes(q))) return false;
    return true;
  });
  sortView();
  page=0;
  render();
}

function render(){
  renderTabs(); renderHead(); renderHint();
  const tb=document.getElementById("tbody");
  const empty=document.getElementById("empty");
  if(view.length===0){
    tb.innerHTML="";
    empty.textContent = watchOnly && watch.size===0
      ? "관심종목이 없습니다. 표의 ☆를 눌러 추가하세요."
      : "조건에 맞는 종목이 없습니다.";
    empty.style.display="block"; renderPager(); return;
  }
  empty.style.display="none";
  const start=page*pageSize, slice=view.slice(start,start+pageSize);
  let html="";
  slice.forEach((r,i)=>{
    const rank=start+i+1;
    const on = watch.has(r.ticker);
    let cells=`<td class="star${on?" on":""}" data-tkr="${esc(r.ticker)}" title="관심종목">${on?"★":"☆"}</td>`;
    cells+=`<td class="rank num">${rank}</td>`;
    cells+=`<td class="l"><a class="tkr" href="${MARKETS[market].tickerUrl(r)}" target="_blank" rel="noopener">${r.ticker.replace(/\.(KS|KQ)$/,'')}</a></td>`;
    cells+=`<td class="l name" title="${esc(r.name)}">${esc(r.name)}</td>`;
    cells+=`<td class="l sector">${esc(r.sector)}</td>`;
    cells+=`<td class="num">${fmtPrice(r.price)}</td>`;
    cells+=`<td class="num">${fmtCap(r.marketCap)}</td>`;
    for(const p of PERIODS){
      const v=r.r[p];
      const sortedCol = isActiveKey("r."+p) ? " colsorted":"";
      cells+=`<td class="num ${pctClass(v)}${sortedCol}">${fmtPct(v)}</td>`;
    }
    cells+=scoreCell(r.score);
    cells+=qualCell(r.quality);
    cells+=accelCell(r.accel);
    html+=`<tr>${cells}</tr>`;
  });
  tb.innerHTML=html;
  renderPager();
}

// Toggle a metric in/out of the composite pick set (switches to composite mode).
function togglePick(key){
  sortMode="composite";
  const i=picks.indexOf(key);
  if(i>=0) picks.splice(i,1); else picks.push(key);
  if(picks.length===0) picks.push("score");   // never leave it empty
  applyFilters();
}

function renderTabs(){
  const el=document.getElementById("tabs");
  const comp = sortMode==="composite";
  let html = SORT_TABS.map(t=>{
    const on = comp && picks.includes(t.key);
    return `<div class="tab ${on?"active":(comp?"dim":"")}" data-k="${t.key}">${t.label}</div>`;
  }).join("");
  // direction toggle for whichever sort is active
  const d = activeDir();
  html += `<div class="tab dir-toggle" id="dirToggle" title="정렬 방향">${d==="desc"?"▼ 높은순":"▲ 낮은순"}</div>`;
  el.innerHTML = html;
  el.querySelectorAll(".tab[data-k]").forEach(t=>t.onclick=()=>togglePick(t.dataset.k));
  document.getElementById("dirToggle").onclick=()=>{
    if(sortMode==="composite") compDir = compDir==="desc"?"asc":"desc";
    else colDir = colDir==="desc"?"asc":"desc";
    applyFilters();
  };
}

function renderHint(){
  const el=document.getElementById("sorthint");
  if(sortMode==="composite"){
    const labels = picks.map(k=>TAB_LABEL[k]);
    el.innerHTML = picks.length>=2
      ? `복합 강도순 ${compDir==="desc"?"▼":"▲"} · <b>${esc(labels.join(" + "))}</b> ${picks.length}개 지표의 시장 내 순위 평균`
      : `정렬: <b>${esc(labels[0])}</b> ${compDir==="desc"?"높은순":"낮은순"} · 탭을 여러 개 누르면 복합 강도순으로 묶입니다`;
  } else {
    el.innerHTML = `정렬: <b>${esc(COL_LABEL[colKey]||colKey)}</b> ${colDir==="desc"?"내림차순":"오름차순"}`;
  }
}

function renderHead(){
  const tr=document.getElementById("thead");
  tr.innerHTML = COLS.map(c=>{
    const sorted = c.sortable && isActiveKey(c.key);
    const arr = sorted ? `<span class="arr">${activeDir()==="desc"?"▼":"▲"}</span>` : "";
    const label = c.key==="_star" ? "⭐" : c.label;
    return `<th class="${c.align==='l'?'l':''} ${c.key==='_star'?'star':''} ${sorted?'sorted':''}" data-k="${c.key}" data-s="${c.sortable}">${label}${arr}</th>`;
  }).join("");
  tr.querySelectorAll("th").forEach(th=>{
    if(th.dataset.s!=="true") return;
    th.onclick=()=>{
      const key=th.dataset.k;
      if(METRIC_KEYS.has(key)){ togglePick(key); return; }   // metric header = composite toggle
      sortMode="column";
      if(colKey===key) colDir=colDir==="desc"?"asc":"desc";
      else { colKey=key; colDir = (key==="ticker"||key==="name"||key==="sector") ? "asc":"desc"; }
      applyFilters();
    };
  });
}

function renderPager(){
  const el=document.getElementById("pager");
  const total=view.length, pages=Math.max(1,Math.ceil(total/pageSize));
  const from=total?page*pageSize+1:0, to=Math.min((page+1)*pageSize,total);
  el.innerHTML=`<button id="prev" ${page<=0?"disabled":""}>← 이전</button>
    <span>${from.toLocaleString()}–${to.toLocaleString()} / 총 ${total.toLocaleString()}개 · ${page+1}/${pages} 페이지</span>
    <button id="next" ${page>=pages-1?"disabled":""}>다음 →</button>`;
  const prev=document.getElementById("prev"), next=document.getElementById("next");
  if(prev) prev.onclick=()=>{ if(page>0){page--;render();window.scrollTo(0,0);} };
  if(next) next.onclick=()=>{ if(page<pages-1){page++;render();window.scrollTo(0,0);} };
}

function esc(s){ return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c])); }

function loadWatch(m){
  try{ return new Set(JSON.parse(localStorage.getItem("rs-watch-"+m)||"[]")); }catch(e){ return new Set(); }
}
function saveWatch(){
  try{ localStorage.setItem("rs-watch-"+market, JSON.stringify([...watch])); }catch(e){}
}
function updateWatchCount(){
  document.getElementById("watchcnt").textContent = watch.size ? `(${watch.size})` : "";
}

function setMarket(m){
  const data = window["SCREENER_DATA_"+m.toUpperCase()];
  if(!data) return false;
  market = m;
  DATA = data; rows = DATA.stocks;
  precomputePercentiles();
  watch = loadWatch(m);
  updateWatchCount();
  // toggle UI
  document.querySelectorAll("#marketToggle button").forEach(b=>b.classList.toggle("active", b.dataset.m===m));
  // market-cap dropdown rebuilt per market
  const mcap = document.getElementById("mcap");
  mcap.innerHTML = MARKETS[m].mcapOptions.map(o=>`<option value="${o.v}">${esc(o.l)}</option>`).join("");
  // sector dropdown rebuilt per market
  const sec = document.getElementById("sector");
  sec.innerHTML = '<option value="">전체 섹터</option>';
  [...new Set(rows.map(r=>r.sector))].filter(Boolean).sort().forEach(s=>{
    const o=document.createElement("option"); o.value=s; o.textContent=s; sec.appendChild(o);
  });
  document.getElementById("meta").innerHTML =
    `<b>${esc(DATA.market.label)}</b> · 기준일 <b>${DATA.asOf}</b> · <b>${DATA.count.toLocaleString()}</b>개 종목 · `+
    `시총 ≥ ${esc(DATA.market.minMarketCapLabel)} · 분할조정 주가수익률(배당 제외) · `+
    `<span title="${DATA.generatedAt}">갱신 ${DATA.generatedAt.slice(0,10)}</span>`+
    (DATA.scoreBasis ? `<br><b>RS점수</b> = ${esc(DATA.scoreBasis)} → 1~99 (99=최강)` : "")+
    (DATA.signalsBasis ? `<br>${esc(DATA.signalsBasis)}` : "");
  try{ localStorage.setItem("rs-market", m); }catch(e){}
  page=0;
  applyFilters();
  return true;
}

function init(){
  if(!window.SCREENER_DATA_US && !window.SCREENER_DATA_KR){
    document.querySelector(".tablewrap").innerHTML=
      `<div class="err">데이터 파일을 찾을 수 없습니다.<br>먼저 <b>uv run python refresh.py</b> 로 생성하세요.</div>`;
    return;
  }
  document.getElementById("search").addEventListener("input", applyFilters);
  document.getElementById("sector").addEventListener("change", applyFilters);
  document.getElementById("mcap").addEventListener("change", applyFilters);
  document.getElementById("watchonly").addEventListener("change", e=>{ watchOnly=e.target.checked; applyFilters(); });
  document.getElementById("pagesize").addEventListener("change", e=>{ pageSize=parseInt(e.target.value); page=0; render(); });
  document.querySelectorAll("#marketToggle button").forEach(b=>{ b.onclick=()=>setMarket(b.dataset.m); });
  // star toggle via event delegation (rows are re-rendered as innerHTML)
  document.getElementById("tbody").addEventListener("click", e=>{
    const cell = e.target.closest(".star"); if(!cell) return;
    const tkr = cell.dataset.tkr;
    if(watch.has(tkr)) watch.delete(tkr); else watch.add(tkr);
    saveWatch(); updateWatchCount();
    if(watchOnly) applyFilters();
    else { cell.classList.toggle("on"); cell.textContent = watch.has(tkr) ? "★" : "☆"; }
  });
  let saved="us"; try{ saved=localStorage.getItem("rs-market")||"us"; }catch(e){}
  if(!setMarket(saved)) setMarket(saved==="us"?"kr":"us");
}
init();
</script>
</body>
</html>
